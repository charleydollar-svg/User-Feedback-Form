<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="page-bg" id="page-bg">Page Background</div>
        <main class="container" id="container">Main Content</main>
            <header class="header">Header</header>
            <div class="form-wrapper">Form Wrapper</div>
                <form id="feedback-form" novalidate></form>

                    <div class="fields-group" id="fields-group">Field Group</div>
                        <div class="field-block" data-field="name">Name Field</div>
                        <div class="field-block" data-field="email">Email Field</div>
                        <div class="field-block" data-field="comments">Message Field</div>
                            <label for="comments" class="field-label">Message</label>
                            <div class="field-input-wrapper"><input type="text" id="comments" name="comments"></div>
                            <div class="input-wrap textarea-wrap" data-tooltip="Share thoughts, ideas, bugs, praise — anything helps." data-field="comments">
             
    <script src="script.js"></script>
</body>
</html>
