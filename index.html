<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="main-container">
        <h1>Your Feedback Matters!</h1>
        <p>We would love to hear your thoughts on our website. Please take a moment to share your feedback with us.</p>
        
            <form id="feedback-form">
                
                <div class="field-group">
                    <label for="name">Name:</label><br>
                    <input type="text" id="username" name="username" class="field-input" placeholder="What's your name?" maxlength="50" required>
                    <span class="char-count" id="count-name">0 / 50</span>
                </div><br>

                <div class="field-group">
                    <label for="email">Email:</label><br>
                    <input type="email" id="email" name="email" class="field-input" placeholder="What's your email?" maxlength="50" required>
                    <span class="char-count" id="count-email">0 / 50</span>
                </div><br>

                <div class="field-group">
                    <label for="feedback">Feedback:</label><br>
                    <div class="input-wrap textarea-wrap" data-tooltip="Share thoughts, ideas, bugs, praise — anything helps." data-field="comments">
                        <textarea id="comments" name="comments" class="field-input" placeholder="What's on your mind?" rows="5" maxlength="500"></textarea>
                        <span class="char-count" id="count-comments">0 / 500</span>
                    </div>

                    <button type="submit">Submit Feedback</button>
                     <p id="error-message"></p>
            </form>
        <div id="feedback-display">
            <h2>Previous Feedback:</h2>
        </div>
    </div>

    <div id="tooltip" class="hidden">
    </div>
                    

    <script src="script.js"></script>
    <script src="cp_1.js"></script>
</body>
</html>
